<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Lukas' Sea Check</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#08080F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sea Check">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080F; --panel:rgba(255,255,255,.025); --line:rgba(255,255,255,.09);
    --ink:#F5F7FA; --mut:#7B8398;
    --lime:#B4F03C; --cyan:#37D3EA; --violet:#8B5CF6; --pink:#EC4899; --flame:#FF6B4A;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
    --body:'Nunito',system-ui,-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--ink); min-height:100%; overflow-x:hidden;
    background:
      radial-gradient(680px 380px at 80% -70px, rgba(139,92,246,.34), transparent 60%),
      radial-gradient(560px 400px at 6% 6%, rgba(37,99,235,.12), transparent 60%),
      var(--bg);
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px calc(120px + env(safe-area-inset-bottom))}

  /* ---------- Header ---------- */
  .top{display:flex;align-items:flex-start;gap:12px}
  .brand h1{font-family:var(--disp);font-weight:700;font-size:34px;line-height:.9;letter-spacing:-1px}
  .brand .c{color:var(--lime)}
  .stats{margin-left:auto;display:flex;gap:9px}
  .pill{font-family:var(--disp);font-weight:700;font-size:15px;border-radius:999px;padding:8px 14px;
    border:1.5px solid var(--line);display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.02)}
  .pill.flame{border-color:rgba(255,107,74,.5);box-shadow:0 0 16px rgba(255,107,74,.18)}
  .pill.xp{border-color:rgba(180,240,60,.45);color:var(--lime);box-shadow:0 0 16px rgba(180,240,60,.14)}
  .pill.xp small{font-size:11px;letter-spacing:1px}

  /* ---------- Level card ---------- */
  .levelcard{margin-top:18px;border:1px solid var(--line);border-radius:22px;padding:16px 18px;
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(135deg, rgba(139,92,246,.16), rgba(37,99,235,.05));
    box-shadow:inset 0 0 40px rgba(139,92,246,.08)}
  .ring{position:relative;width:92px;height:92px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .ctr .lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--mut)}
  .ring .ctr .num{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1}
  .levelinfo{flex:1;min-width:0}
  .levelinfo .rank{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.5px;text-transform:uppercase}
  .levelinfo .sub{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--mut);margin-top:3px}
  .xpbar{height:10px;border-radius:6px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:11px}
  .xpbar>i{display:block;height:100%;border-radius:6px;
    background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .5s cubic-bezier(.3,1,.4,1)}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:10px;margin:18px 0 6px}
  .tab{flex:1;border:1.5px solid var(--line);border-radius:15px;padding:15px 6px;cursor:pointer;
    background:rgba(255,255,255,.02);color:var(--mut);font-family:var(--disp);font-weight:700;
    font-size:14px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px;
    transition:transform .12s, border-color .2s, color .2s, box-shadow .2s, background .2s}
  .tab .i{font-size:16px}
  .tab.active{border-color:var(--lime);color:var(--lime);background:rgba(180,240,60,.06);
    box-shadow:0 0 0 1px var(--lime),0 0 22px rgba(180,240,60,.22)}
  .tab:active{transform:scale(.97)}

  /* ---------- Quest card ---------- */
  .quest{margin-top:14px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.02);padding:16px 18px}
  .quest-top{display:flex;justify-content:space-between;align-items:center}
  .quest-name{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:3px;color:var(--mut);
    text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .quest-name .dot{color:var(--cyan)}
  .quest-pct{font-family:var(--disp);font-weight:700;font-size:24px;color:var(--lime)}
  .qbar{height:12px;border-radius:7px;background:rgba(255,255,255,.09);overflow:hidden;margin:12px 0 10px}
  .qbar>i{display:block;height:100%;border-radius:7px;
    background:linear-gradient(90deg,var(--lime),var(--cyan));transition:width .5s cubic-bezier(.3,1,.4,1)}
  .quest-sub{font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--mut)}

  /* ---------- Sections & items ---------- */
  .section{margin-top:24px}
  .section-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .section-head .tri{color:var(--cyan);font-size:13px}
  .section-head h2{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.5px;text-transform:uppercase}

  .item{display:flex;align-items:center;gap:15px;border:1px solid var(--line);border-radius:16px;
    background:rgba(255,255,255,.02);padding:15px 16px;margin-bottom:12px;cursor:pointer;
    user-select:none;-webkit-user-select:none;position:relative;
    transition:transform .1s, border-color .25s, background .25s, box-shadow .25s}
  .item:active{transform:scale(.985)}
  .box{width:44px;height:44px;min-width:44px;border-radius:12px;border:2px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;transition:all .2s}
  .box svg{width:22px;height:22px;stroke:#062A30;stroke-width:3.5;fill:none;
    stroke-dasharray:26;stroke-dashoffset:26;transition:stroke-dashoffset .25s ease .05s}
  .item.done{border-color:rgba(55,211,234,.4);background:rgba(55,211,234,.05);box-shadow:0 0 20px rgba(55,211,234,.1)}
  .item.done .box{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 18px rgba(55,211,234,.55)}
  .item.done .box svg{stroke-dashoffset:0}
  .item.done .txt{text-decoration:line-through;text-decoration-color:rgba(123,131,152,.8);color:var(--mut)}
  .item.pop .box{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.28)}100%{transform:scale(1)}}
  .txt{font-family:var(--body);font-weight:800;font-size:18px;flex:1;line-height:1.25}
  .xpv{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--mut);transition:color .2s}
  .item.done .xpv{color:var(--cyan)}
  .thumb{width:44px;height:44px;min-width:44px;border-radius:10px;object-fit:cover;border:1px solid var(--line)}
  .del{display:none;width:34px;height:34px;min-width:34px;border-radius:9px;background:var(--pink);
    color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;align-items:center;justify-content:center}
  body.editing .del{display:flex}
  body.editing .item{border-style:dashed}
  body.editing .xpv{display:none}

  /* ---------- Add row ---------- */
  .add-row{display:none;gap:9px;margin:0 0 12px}
  body.editing .add-row{display:flex}
  .add-row input{flex:1;background:rgba(255,255,255,.03);border:1.5px dashed rgba(255,255,255,.2);
    border-radius:13px;color:var(--ink);font-family:var(--body);font-weight:700;font-size:16px;padding:13px 15px;outline:none}
  .add-row input::placeholder{color:var(--mut)}
  .btn-mini{border:none;border-radius:13px;padding:0 17px;font-size:19px;font-weight:800;cursor:pointer;
    min-height:48px;background:var(--cyan);color:#062A30}
  .btn-mini.cam{background:var(--lime);color:#233800}

  /* ---------- Dock ---------- */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:26px 18px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(8,8,15,0), rgba(8,8,15,.96) 34%)}
  .dock-inner{max-width:560px;margin:0 auto;display:flex;gap:11px}
  .btn{border:none;border-radius:16px;font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.5px;
    cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.5);transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn.newtrip{flex:0 0 120px;padding:16px 8px;background:rgba(255,255,255,.04);border:1.5px solid var(--line);color:var(--ink)}
  .btn.edit{flex:1;padding:16px 8px;color:#fff;text-transform:uppercase;
    background:linear-gradient(90deg,var(--pink),var(--violet))}
  .btn.edit.on{background:linear-gradient(90deg,var(--lime),var(--cyan));color:#152300}
  .btn.sound{flex:0 0 56px;padding:16px 0;background:rgba(255,255,255,.04);border:1.5px solid var(--line);
    color:var(--ink);font-size:20px}

  /* ---------- Overlay ---------- */
  .overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    background:rgba(6,6,12,.9);backdrop-filter:blur(5px);flex-direction:column;text-align:center;padding:26px}
  .overlay.show{display:flex}
  .badge{width:110px;height:110px;animation:badgeIn .5s cubic-bezier(.2,1.5,.4,1)}
  @keyframes badgeIn{from{transform:scale(.3) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  .overlay .kicker{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:4px;color:var(--cyan);
    text-transform:uppercase;margin-top:16px}
  .overlay h2{font-family:var(--disp);font-weight:700;font-size:32px;letter-spacing:.5px;margin-top:6px;color:var(--lime)}
  .overlay p{font-family:var(--body);font-weight:700;font-size:15px;color:var(--mut);margin-top:10px;max-width:320px}
  .overlay button{margin-top:26px;border:none;border-radius:14px;padding:15px 40px;font-family:var(--disp);
    font-size:15px;font-weight:700;background:var(--lime);color:#152300;cursor:pointer}
  .spark{position:fixed;top:50%;left:50%;width:8px;height:8px;border-radius:2px;z-index:99;pointer-events:none}

  .toast{position:fixed;left:50%;bottom:118px;transform:translateX(-50%) translateY(20px);z-index:60;
    background:#15131F;border:1px solid var(--cyan);color:var(--ink);font-family:var(--body);font-weight:800;
    font-size:14px;padding:12px 20px;border-radius:13px;opacity:0;transition:all .3s;pointer-events:none;
    box-shadow:0 10px 26px rgba(0,0,0,.55)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;padding:70px 0;font-family:var(--mono);color:var(--mut);letter-spacing:2px}

  @media (prefers-reduced-motion: reduce){.badge{animation:none!important}*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><h1>Lukas&rsquo;<br><span class="c">Checklists</span></h1></div>
    <div class="stats">
      <div class="pill flame">🔥 <span id="flame">0</span></div>
      <div class="pill xp"><span id="xp">0</span> <small>XP</small></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="quest">
    <div class="quest-top">
      <span class="quest-name"><span class="dot">◆</span> <span id="questName">Quest</span></span>
      <span class="quest-pct" id="pct">0%</span>
    </div>
    <div class="qbar"><i id="qfill" style="width:0%"></i></div>
    <div class="quest-sub" id="questSub">0 of 0 packed</div>
  </div>

  <div id="sections" class="loading">Loading your kit…</div>
</div>

<div class="dock">
  <div class="dock-inner">
    <button class="btn newtrip" id="btnReset">New Trip</button>
    <button class="btn edit" id="btnEdit">Edit list</button>
    <button class="btn sound" id="btnSound">🔊</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <svg class="badge" id="badge" viewBox="0 0 110 110" aria-hidden="true"></svg>
  <div class="kicker" id="ovKicker">Quest</div>
  <h2 id="ovTitle">Complete</h2>
  <p id="ovMsg"></p>
  <button id="ovClose">Nice! ⚓</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" accept="image/*" id="photoInput" style="display:none">

<script>
'use strict';

/* ================= Config ================= */
var XP_PER_ITEM = 10;
var RANKS = [
  {lvl:0, name:'Stowaway',   xp:0},
  {lvl:1, name:'Deckhand',   xp:40},
  {lvl:2, name:'Sailor',     xp:100},
  {lvl:3, name:'Bosun',      xp:180},
  {lvl:4, name:'First Mate', xp:300},
  {lvl:5, name:'Skipper',    xp:460},
  {lvl:6, name:'Captain',    xp:680},
  {lvl:7, name:'Admiral',    xp:1000}
];
var DEFAULT_TEMPLATES = {
  summer:{ name:'Sailing', ico:'☀️', sections:[
    {title:'Sailing gear', items:['Life jacket','Sailing shoes','Sailing gloves','Cap + sunglasses','Rash guard']},
    {title:'Sun & water', items:['Sunscreen','Big water bottle','Snacks']},
    {title:'Boat kit', items:['Sail','Daggerboard + rudder','Sprit & lines','Bailer']}
  ]},
  winter:{ name:'Sailing', ico:'❄️', sections:[
    {title:'Sailing gear', items:['Wetsuit','Spray top','Neoprene boots','Neoprene gloves','Beanie']},
    {title:'Warm & dry', items:['Towel','Full change of clothes','Warm jacket for shore','Thermos with hot drink']},
    {title:'Boat kit', items:['Sail','Daggerboard + rudder','Lines','Bailer']}
  ]},
  papa:{ name:'Papa', ico:'🎒', sections:[
    {title:'School', items:['School bag','Homework','iPad + charger']},
    {title:'Clothes', items:['Clothes for the days','Pajamas','Sneakers']},
    {title:'Important', items:['Phone + charger','Toothbrush','Sailing gear if training']}
  ]}
};
var STORE_KEY = 'sea-check-v3';
var RING_CIRC = 251.3;

/* ================= Storage ================= */
var Store = {
  mem:{},
  get:function(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in this.mem)?this.mem[k]:null; } },
  set:function(k,v){ try{ localStorage.setItem(k,v); return true; }
    catch(e){ this.mem[k]=v; if(e && e.name==='QuotaExceededError') return 'quota'; return false; } }
};
var state=null, saveTimer=null, pendingPhotoSection=null;

function freshState(){
  var t={}, keys=Object.keys(DEFAULT_TEMPLATES);
  keys.forEach(function(key){
    var d=DEFAULT_TEMPLATES[key];
    t[key]={ name:d.name, ico:d.ico, rewarded:false,
      sections:d.sections.map(function(s,si){
        return { title:s.title, items:s.items.map(function(txt,ii){
          return { id:key+'_'+si+'_'+ii, text:txt, done:false, awarded:false, photo:null };
        })};
      })
    };
  });
  return { xp:0, flame:0, sound:true, active:'summer', templates:t };
}
function reconcileLabels(){
  if(!state || !state.templates) return;
  Object.keys(DEFAULT_TEMPLATES).forEach(function(k){
    if(state.templates[k]){
      state.templates[k].name=DEFAULT_TEMPLATES[k].name;   // presentation only
      state.templates[k].ico=DEFAULT_TEMPLATES[k].ico;
    }
  });
}
function loadState(){
  var raw=Store.get(STORE_KEY);
  if(raw){ try{ state=JSON.parse(raw); reconcileLabels(); return; }catch(e){} }
  state=freshState();
}
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    var r=Store.set(STORE_KEY, JSON.stringify(state));
    if(r==='quota') showToast('Storage full — remove a photo or two');
  },350);
}

/* ================= Levels ================= */
function levelInfo(xp){
  var cur=RANKS[0], nxt=null;
  for(var i=0;i<RANKS.length;i++){ if(xp>=RANKS[i].xp){ cur=RANKS[i]; nxt=RANKS[i+1]||null; } }
  if(!nxt) return {lvl:cur.lvl,name:cur.name,next:null,toNext:0,frac:1};
  var span=nxt.xp-cur.xp, into=xp-cur.xp;
  return {lvl:cur.lvl,name:cur.name,next:nxt.name,toNext:nxt.xp-xp,frac:span?into/span:1};
}

/* ================= Sound ================= */
var audioCtx=null;
function ctx(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
function tone(f,start,dur,type,vol,slideTo){
  var c=ctx(),o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,c.currentTime+start);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+start+dur);
  g.gain.setValueAtTime(0.0001,c.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.22,c.currentTime+start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+start+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+start); o.stop(c.currentTime+start+dur+0.05);
}
var sfx={
  check:function(){ if(!state.sound)return; tone(560,0,.1,'sine',.28,900); tone(1120,.05,.13,'sine',.16); },
  uncheck:function(){ if(!state.sound)return; tone(320,0,.11,'sine',.2,190); },
  switch:function(){ if(!state.sound)return; tone(240,0,.16,'triangle',.18,640); },
  camera:function(){ if(!state.sound)return; tone(1200,0,.04,'square',.13); tone(820,.05,.05,'square',.13); },
  levelup:function(){ if(!state.sound)return; [523,659,880,1175].forEach(function(f,i){ tone(f,i*.09,.22,'square',.14); }); },
  fanfare:function(){ if(!state.sound)return; [523,659,784,1047].forEach(function(f,i){ tone(f,i*.12,.28,'triangle',.2); });
    tone(1047,.5,.55,'triangle',.24); }
};

/* ================= Render ================= */
function tpl(){ return state.templates[state.active]; }
function render(){ renderStats(); renderTabs(); renderQuest(); renderSections(); }

function renderStats(){
  document.getElementById('flame').textContent=state.flame;
  document.getElementById('xp').textContent=state.xp;
  document.getElementById('btnSound').textContent=state.sound?'🔊':'🔇';
}
function renderLevel(){
  var L=levelInfo(state.xp);
  document.getElementById('lvl').textContent=L.lvl;
  document.getElementById('rank').textContent=L.name;
  document.getElementById('lvlsub').textContent = L.next ? (L.toNext+' XP to '+L.next) : 'Top rank reached';
  document.getElementById('ringProg').style.strokeDashoffset = (RING_CIRC*(1-L.frac)).toFixed(1);
  document.getElementById('xpfill').style.width = Math.round(L.frac*100)+'%';
}
function renderTabs(){
  var el=document.getElementById('tabs'); el.innerHTML='';
  Object.keys(state.templates).forEach(function(key){
    var t=state.templates[key];
    var b=document.createElement('button');
    b.className='tab'+(key===state.active?' active':'');
    b.innerHTML='<span class="i">'+t.ico+'</span>'+escapeHtml(t.name);
    b.onclick=function(){ if(state.active!==key){ state.active=key; sfx.switch(); save(); render(); } };
    el.appendChild(b);
  });
}
function counts(){ var total=0,done=0;
  tpl().sections.forEach(function(s){ s.items.forEach(function(it){ total++; if(it.done)done++; }); });
  return {total:total,done:done}; }
function renderQuest(){
  var c=counts(), pct=c.total?Math.round(100*c.done/c.total):0;
  document.getElementById('questName').textContent='Progress';
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('qfill').style.width=pct+'%';
  document.getElementById('questSub').textContent=c.done+' of '+c.total+' packed';
}
function renderSections(){
  var root=document.getElementById('sections'); root.className=''; root.innerHTML='';
  tpl().sections.forEach(function(section,si){
    var sec=document.createElement('div'); sec.className='section';
    var head=document.createElement('div'); head.className='section-head';
    head.innerHTML='<span class="tri">▸</span><h2>'+escapeHtml(section.title)+'</h2>';
    sec.appendChild(head);
    section.items.forEach(function(item){
      var row=document.createElement('div'); row.className='item'+(item.done?' done':'');
      var box=document.createElement('div'); box.className='box';
      box.innerHTML='<svg viewBox="0 0 24 24"><polyline points="4,13 10,19 20,6"/></svg>';
      row.appendChild(box);
      if(item.photo){ var img=document.createElement('img'); img.className='thumb'; img.src=item.photo; img.alt=''; row.appendChild(img); }
      var txt=document.createElement('div'); txt.className='txt'; txt.textContent=item.text;
      txt.onclick=function(ev){
        if(document.body.classList.contains('editing')){ ev.stopPropagation(); renameItem(si,item.id); }
      };
      row.appendChild(txt);
      var xpv=document.createElement('div'); xpv.className='xpv'; xpv.textContent='+'+XP_PER_ITEM; row.appendChild(xpv);
      var del=document.createElement('button'); del.className='del'; del.textContent='✕';
      del.onclick=function(ev){ ev.stopPropagation(); deleteItem(si,item.id); };
      row.appendChild(del);
      row.onclick=function(){ if(!document.body.classList.contains('editing')) toggleItem(si,item.id,row); };
      sec.appendChild(row);
    });
    var add=document.createElement('div'); add.className='add-row';
    var inp=document.createElement('input'); inp.type='text'; inp.placeholder='Add to '+section.title+'…'; inp.maxLength=60;
    var ok=document.createElement('button'); ok.className='btn-mini'; ok.textContent='＋';
    var cam=document.createElement('button'); cam.className='btn-mini cam'; cam.textContent='📷';
    ok.onclick=function(){ addTextItem(si,inp.value); inp.value=''; };
    inp.onkeydown=function(e){ if(e.key==='Enter'){ addTextItem(si,inp.value); inp.value=''; } };
    cam.onclick=function(){ pendingPhotoSection=si; sfx.camera(); document.getElementById('photoInput').click(); };
    add.appendChild(inp); add.appendChild(ok); add.appendChild(cam);
    sec.appendChild(add);
    root.appendChild(sec);
  });
}

/* ================= Actions ================= */
function toggleItem(si,id,row){
  var t=tpl(), item=null, arr=t.sections[si].items;
  for(var i=0;i<arr.length;i++){ if(arr[i].id===id){ item=arr[i]; break; } }
  if(!item) return;
  if(!item.done){
    item.done=true;
    if(!item.awarded){ item.awarded=true; state.xp+=XP_PER_ITEM; }
    sfx.check();
    if(row){ row.classList.add('pop'); setTimeout(function(){ row.classList.remove('pop'); },400); }
    save(); render();
    var c=counts();
    if(c.total>0 && c.done===c.total && !t.rewarded){
      t.rewarded=true; state.flame+=1; save(); render();
      setTimeout(function(){ celebrateComplete(); },350);
    }
  } else {
    item.done=false; t.rewarded=false; sfx.uncheck(); save(); render();
  }
}
function addTextItem(si,text){ text=(text||'').trim(); if(!text)return;
  tpl().sections[si].items.push({id:'u'+Date.now(),text:text,done:false,awarded:false,photo:null});
  sfx.check(); save(); render(); showToast('Added: '+text); document.body.classList.add('editing'); }
function renameItem(si,id){
  var items=tpl().sections[si].items, item=null;
  for(var i=0;i<items.length;i++){ if(items[i].id===id){ item=items[i]; break; } }
  if(!item) return;
  var current = (item.text.indexOf('Photo item')===0) ? '' : item.text;
  var next = window.prompt('Rename this item:', current);
  if(next===null) return;                 // cancelled
  next=next.trim(); if(!next) return;      // empty = keep old
  item.text=next; sfx.check(); save(); render(); document.body.classList.add('editing');
}
function deleteItem(si,id){ var items=tpl().sections[si].items,idx=-1;
  for(var i=0;i<items.length;i++){ if(items[i].id===id){ idx=i; break; } }
  if(idx>=0){ items.splice(idx,1); sfx.uncheck(); save(); render(); document.body.classList.add('editing'); } }
function resetTrip(){ var t=tpl();
  t.sections.forEach(function(s){ s.items.forEach(function(it){ it.done=false; it.awarded=false; }); });
  t.rewarded=false; sfx.switch(); save(); render(); showToast('New trip — ready to pack'); }

/* ================= Photos ================= */
document.getElementById('photoInput').addEventListener('change', function(e){
  var file=e.target.files && e.target.files[0]; e.target.value='';
  if(!file || pendingPhotoSection===null) return;
  var si=pendingPhotoSection; pendingPhotoSection=null;
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var maxSide=320, scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      var cv=document.createElement('canvas'); cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      var data=cv.toDataURL('image/jpeg',0.6);
      tpl().sections[si].items.push({id:'p'+Date.now(),text:'Photo item — tap Edit to rename',done:false,awarded:false,photo:data});
      sfx.check(); save(); render(); document.body.classList.add('editing'); showToast('Photo added to the list');
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
});

/* ================= Celebrations ================= */
var BADGE_COMPLETE='<circle cx="55" cy="48" r="34" fill="#0E1524" stroke="#B4F03C" stroke-width="4"/>'+
  '<circle cx="55" cy="48" r="24" fill="none" stroke="#37D3EA" stroke-width="2"/>'+
  '<polyline points="42,49 52,59 70,38" fill="none" stroke="#B4F03C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>'+
  '<path d="M40 78 L34 104 L46 93 L55 102 L64 93 L76 104 L70 78 Z" fill="#EC4899" opacity=".9"/>';
var BADGE_LEVEL='<circle cx="55" cy="55" r="40" fill="#0E1524" stroke="#8B5CF6" stroke-width="4"/>'+
  '<circle cx="55" cy="55" r="29" fill="none" stroke="#37D3EA" stroke-width="2"/>'+
  '<path d="M55 32 L61 52 L82 52 L65 65 L71 86 L55 73 L39 86 L45 65 L28 52 L49 52 Z" fill="#B4F03C"/>';
function sparks(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var colors=['#B4F03C','#37D3EA','#8B5CF6','#EC4899'];
  for(var i=0;i<44;i++){
    var s=document.createElement('div'); s.className='spark'; s.style.background=colors[i%colors.length];
    var ang=Math.random()*Math.PI*2, dist=90+Math.random()*230, dur=750+Math.random()*750;
    document.body.appendChild(s);
    (function(sp,a,d,dr){
      sp.animate([{transform:'translate(0,0) scale(1)',opacity:1},
        {transform:'translate('+Math.cos(a)*d+'px,'+(Math.sin(a)*d+130)+'px) scale(.3)',opacity:0}],
        {duration:dr,easing:'cubic-bezier(.2,.6,.4,1)'});
      setTimeout(function(){ sp.remove(); },dr+60);
    })(s,ang,dist,dur);
  }
}
function celebrateComplete(){
  document.getElementById('badge').innerHTML=BADGE_COMPLETE;
  document.getElementById('ovKicker').textContent=tpl().name;
  document.getElementById('ovTitle').textContent='All Packed!';
  document.getElementById('ovMsg').textContent='Everything packed — you\u2019re cleared to launch. Fair winds!';
  document.getElementById('overlay').classList.add('show');
  sfx.fanfare(); sparks(); renderStats();
}
document.getElementById('ovClose').onclick=function(){ document.getElementById('overlay').classList.remove('show'); };

/* ================= Helpers & buttons ================= */
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('show'); },2200); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

document.getElementById('btnReset').onclick=function(){
  if(confirm('Start a new trip? All checks clear. Items and photos stay. (Your XP and rank are kept.)')) resetTrip(); };
document.getElementById('btnEdit').onclick=function(){
  var on=document.body.classList.toggle('editing');
  this.classList.toggle('on',on); this.textContent=on?'Done':'Edit list'; sfx.switch();
  if(on) showToast('Tap an item\u2019s name to rename it'); };
document.getElementById('btnSound').onclick=function(){ state.sound=!state.sound; save(); renderStats(); if(state.sound) sfx.check(); };

/* ================= Boot ================= */
loadState(); render();
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}
</script>
