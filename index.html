<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Lukas' Sea Check</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#04101B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sea Check">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#04101B; --hull:#0B2130; --hull2:#102A3D; --line:#1D3E56;
    --spray:#E9F3F8; --mist:#7EA0B6;
    --volt:#19E3C6;      /* foiling cyan — checks, progress */
    --signal:#FF5C3D;    /* signal-flag red — delete/alert */
    --brass:#F2C14E;     /* reward accent */
    --disp:'Space Grotesk', 'Inter', system-ui, sans-serif;
    --body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--body);
    background:
      radial-gradient(900px 420px at 50% -160px, #12405E 0%, transparent 62%),
      linear-gradient(180deg, #061725 0%, var(--abyss) 55%, #030B14 100%);
    color:var(--spray); min-height:100%; overflow-x:hidden;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 128px}

  /* ---------- Header ---------- */
  header{position:relative;padding:6px 2px 2px}
  .brandrow{display:flex;align-items:center;gap:12px}
  .mark{width:40px;height:40px;flex:none;filter:drop-shadow(0 0 12px rgba(25,227,198,.35))}
  h1{
    font-family:var(--disp);font-weight:700;font-size:clamp(26px,7.5vw,36px);
    letter-spacing:-0.5px;line-height:.95;color:var(--spray);
  }
  h1 .sea{color:var(--volt)}
  .eyebrow{font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:3px;
    text-transform:uppercase;color:var(--mist);margin-top:3px}
  .score{margin-left:auto;text-align:right;flex:none}
  .score .pts{font-family:var(--disp);font-weight:700;font-size:22px;color:var(--brass);line-height:1}
  .score .pts small{font-size:11px;color:var(--mist);letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .score .rank{font-size:11px;font-weight:700;color:var(--volt);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

  /* ---------- Template selector ---------- */
  .tabs{display:flex;gap:8px;margin:18px 0 8px}
  .tab{
    flex:1;border:1px solid var(--line);border-radius:12px;padding:12px 6px 10px;
    background:linear-gradient(180deg,var(--hull),#081C29);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .12s ease, border-color .2s, background .2s;
  }
  .tab .ico{font-size:20px;filter:grayscale(.15)}
  .tab .lbl{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.3px;color:var(--mist);text-align:center;line-height:1.1}
  .tab.active{
    border-color:var(--volt);background:linear-gradient(180deg,#0E2E42,#0A2233);
    box-shadow:0 0 0 1px rgba(25,227,198,.35), 0 8px 20px rgba(0,0,0,.4);
    transform:translateY(-2px);
  }
  .tab.active .lbl{color:var(--spray)}
  .tab:active{transform:scale(.97)}

  /* ---------- Passage telemetry (signature) ---------- */
  .passage{
    margin:16px 0 4px;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(180deg,#08202E,#061622);padding:14px 16px 12px;position:relative;overflow:hidden;
  }
  .passage-top{display:flex;justify-content:space-between;align-items:flex-end}
  .passage-name{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--mist)}
  .readout{font-family:var(--disp);font-weight:700;line-height:.8;text-align:right}
  .readout .n{font-size:34px;color:var(--volt);letter-spacing:-1px}
  .readout .u{font-size:12px;color:var(--mist);letter-spacing:2px;text-transform:uppercase}
  .track{position:relative;height:52px;margin-top:8px}
  .courseline{position:absolute;left:6px;right:10px;top:34px;height:2px;
    background:linear-gradient(90deg, rgba(25,227,198,.15), rgba(25,227,198,.55));border-radius:2px}
  .courseline::before,.courseline::after{content:"";position:absolute;top:-3px;width:8px;height:8px;border-radius:50%}
  .courseline::before{left:-4px;background:var(--mist)}                 /* start pin */
  .courseline::after{right:-4px;background:var(--brass);box-shadow:0 0 10px rgba(242,193,78,.6)} /* finish */
  .finishflag{position:absolute;right:2px;top:16px;font-size:15px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .boat{position:absolute;bottom:6px;left:0;width:42px;height:38px;
    transition:left .55s cubic-bezier(.34,1.25,.5,1);animation:bob 3s ease-in-out infinite;z-index:2}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-3px) rotate(2deg)}}
  .wake{position:absolute;bottom:14px;left:0;height:2px;background:linear-gradient(90deg,transparent,rgba(233,243,248,.4));
    border-radius:2px;transition:width .55s ease, left .55s cubic-bezier(.34,1.25,.5,1);z-index:1}

  /* ---------- Sections & items ---------- */
  .section{margin-top:20px}
  .section-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .section-head h2{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.4px;color:var(--spray)}
  .section-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  .item{
    display:flex;align-items:center;gap:14px;
    background:var(--hull);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:9px;cursor:pointer;user-select:none;-webkit-user-select:none;
    transition:transform .1s ease, opacity .25s, border-color .25s, background .25s;position:relative;
  }
  .item:active{transform:scale(.985)}
  .box{width:28px;height:28px;min-width:28px;border-radius:8px;border:2px solid #3A6A88;
    background:#081C29;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
  .box svg{width:16px;height:16px;stroke:var(--abyss);stroke-width:3.5;fill:none;
    stroke-dasharray:24;stroke-dashoffset:24;transition:stroke-dashoffset .25s ease .05s}
  .item.done{opacity:.6;border-color:rgba(25,227,198,.35);background:#0A2331}
  .item.done .box{background:var(--volt);border-color:var(--volt);box-shadow:0 0 14px rgba(25,227,198,.45)}
  .item.done .box svg{stroke-dashoffset:0}
  .item.done .txt{text-decoration:line-through;text-decoration-color:rgba(25,227,198,.6);color:var(--mist)}
  .item.pop .box{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.3)}100%{transform:scale(1)}}
  .txt{font-weight:600;font-size:15.5px;flex:1;line-height:1.3}
  .thumb{width:46px;height:46px;min-width:46px;border-radius:9px;object-fit:cover;border:1px solid var(--line)}
  .del{display:none;width:30px;height:30px;min-width:30px;border-radius:8px;background:var(--signal);
    color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer;align-items:center;justify-content:center}
  body.editing .del{display:flex}
  body.editing .item{border-style:dashed}

  /* ---------- Add row (edit mode) ---------- */
  .add-row{display:none;gap:8px;margin:0 0 10px}
  body.editing .add-row{display:flex}
  .add-row input{flex:1;background:#081C29;border:1px dashed #3A6A88;border-radius:11px;
    color:var(--spray);font-family:var(--body);font-weight:600;font-size:15px;padding:11px 13px;outline:none}
  .add-row input::placeholder{color:#5E86A3}
  .btn-mini{border:none;border-radius:11px;padding:0 15px;font-size:17px;font-weight:800;cursor:pointer;
    min-height:44px;background:var(--volt);color:var(--abyss)}
  .btn-mini.cam{background:var(--brass);color:#3A2C00}

  /* ---------- Dock ---------- */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:linear-gradient(180deg, rgba(4,16,27,0), rgba(3,11,20,.97) 32%);padding:26px 16px 18px}
  .dock-inner{max-width:560px;margin:0 auto;display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:14px;padding:15px 8px;font-family:var(--disp);font-weight:700;
    font-size:14px;letter-spacing:.4px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.45);transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn.newtrip{background:transparent;border:1px solid var(--line);color:var(--spray)}
  .btn.edit{background:linear-gradient(180deg,var(--volt),#12B5A0);color:var(--abyss)}
  .btn.edit.on{background:linear-gradient(180deg,var(--brass),#D9A31F);color:#3A2C00}
  .btn.sound{flex:0 0 56px;background:var(--hull);color:var(--spray);border:1px solid var(--line);font-size:19px}

  /* ---------- Completion ---------- */
  .overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    background:rgba(3,10,17,.86);backdrop-filter:blur(4px);flex-direction:column;text-align:center;padding:24px}
  .overlay.show{display:flex}
  .medal{width:96px;height:96px;animation:medalIn .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes medalIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  .overlay h2{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:1px;color:var(--volt);margin-top:14px}
  .overlay p{font-size:15px;font-weight:600;color:var(--mist);margin-top:8px;max-width:320px}
  .overlay .earned{font-family:var(--disp);color:var(--brass);font-size:18px;margin-top:12px;font-weight:700}
  .overlay button{margin-top:24px;border:none;border-radius:13px;padding:14px 36px;font-family:var(--disp);
    font-size:15px;font-weight:700;background:var(--volt);color:var(--abyss);cursor:pointer}
  .spark{position:fixed;top:50%;left:50%;width:7px;height:7px;border-radius:50%;z-index:99;pointer-events:none}

  .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
    background:var(--hull2);border:1px solid var(--volt);color:var(--spray);font-weight:700;font-size:13px;
    padding:11px 18px;border-radius:12px;opacity:0;transition:all .3s;z-index:60;pointer-events:none;
    box-shadow:0 8px 22px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;padding:60px 0;font-family:var(--disp);font-weight:600;color:var(--mist);letter-spacing:2px}

  @media (prefers-reduced-motion: reduce){.boat,.medal{animation:none!important}*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brandrow">
      <svg class="mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="18" fill="none" stroke="#1D3E56" stroke-width="2"/>
        <path d="M20 3 L23 20 L20 37 L17 20 Z" fill="#19E3C6"/>
        <path d="M3 20 L20 17 L37 20 L20 23 Z" fill="#7EA0B6" opacity=".7"/>
        <circle cx="20" cy="20" r="2.5" fill="#F2C14E"/>
      </svg>
      <div>
        <h1>Lukas' <span class="sea">Sea</span> Check</h1>
        <div class="eyebrow">Rig it. Pack it. Launch.</div>
      </div>
      <div class="score">
        <div class="pts"><span id="ptsCount">0</span> <small>pts</small></div>
        <div class="rank" id="rankName">Deckhand</div>
      </div>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="passage">
    <div class="passage-top">
      <span class="passage-name" id="passageName">Passage</span>
      <div class="readout"><span class="n" id="pct">0</span><span class="u">% ready</span></div>
    </div>
    <div class="track">
      <div class="courseline"></div>
      <div class="finishflag">🏁</div>
      <div class="wake" id="wake"></div>
      <svg class="boat" id="boat" viewBox="0 0 44 40" aria-hidden="true">
        <path d="M5 29 Q22 33 39 29 L35 34 Q22 37 9 34 Z" fill="#102A3D" stroke="#19E3C6" stroke-width="1"/>
        <line x1="21" y1="4" x2="21" y2="29" stroke="#7EA0B6" stroke-width="1.5"/>
        <path d="M21 5 L21 28 L7 28 Z" fill="#19E3C6"/>
        <path d="M22 9 L34 28 L22 28 Z" fill="#E9F3F8" opacity="0.85"/>
      </svg>
    </div>
  </div>

  <div id="sections" class="loading">Charting the course…</div>
</div>

<div class="dock">
  <div class="dock-inner">
    <button class="btn newtrip" id="btnReset">New trip</button>
    <button class="btn edit" id="btnEdit">Edit list</button>
    <button class="btn sound" id="btnSound">🔊</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <svg class="medal" viewBox="0 0 96 96" aria-hidden="true">
    <circle cx="48" cy="42" r="30" fill="#0B2130" stroke="#F2C14E" stroke-width="4"/>
    <circle cx="48" cy="42" r="21" fill="none" stroke="#19E3C6" stroke-width="2"/>
    <path d="M48 22 L52 42 L48 62 L44 42 Z" fill="#19E3C6"/>
    <path d="M28 42 L48 38 L68 42 L48 46 Z" fill="#F2C14E"/>
    <path d="M34 68 L28 92 L40 82 L48 90 L56 82 L68 92 L62 68 Z" fill="#FF5C3D" opacity=".9"/>
  </svg>
  <h2>Course Complete</h2>
  <p id="overlayMsg">Everything packed — you're cleared to launch.</p>
  <div class="earned">+1 point earned</div>
  <button id="overlayClose">Cast off ⚓</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" accept="image/*" id="photoInput" style="display:none">

<script>
'use strict';

/* ================= Templates ================= */
const DEFAULT_TEMPLATES = {
  summer:{ name:'Summer', ico:'☀️', sections:[
    {title:'Sailing gear', items:['Life jacket','Sailing shoes','Sailing gloves','Cap + sunglasses','Rash guard']},
    {title:'Sun & water', items:['Sunscreen','Big water bottle','Snacks']},
    {title:'Boat kit', items:['Sail','Daggerboard + rudder','Sprit & lines','Bailer']}
  ]},
  winter:{ name:'Winter', ico:'❄️', sections:[
    {title:'Sailing gear', items:['Wetsuit','Spray top','Neoprene boots','Neoprene gloves','Beanie']},
    {title:'Warm & dry', items:['Towel','Full change of clothes','Warm jacket for shore','Thermos with hot drink']},
    {title:'Boat kit', items:['Sail','Daggerboard + rudder','Lines','Bailer']}
  ]},
  papa:{ name:'Go to Papa', ico:'🎒', sections:[
    {title:'School', items:['School bag','Homework','iPad + charger']},
    {title:'Clothes', items:['Clothes for the days','Pajamas','Sneakers']},
    {title:'Important', items:['Phone + charger','Toothbrush','Sailing gear if training']}
  ]}
};
const RANKS=[[0,'Deckhand'],[3,'Sailor'],[6,'Bosun'],[10,'First Mate'],[15,'Skipper'],[25,'Admiral']];
const FLAG_COLORS=['#19E3C6','#F2C14E','#4FA8E8','#FF5C3D','#E9F3F8'];
const STORE_KEY='sea-check-v2';

/* ================= Storage (works on downloaded file) ================= */
const Store={
  mem:{},
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in this.mem)?this.mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); return true; }
    catch(e){ this.mem[k]=v; if(e && e.name==='QuotaExceededError') return 'quota'; return false; } }
};

let state=null, saveTimer=null, pendingPhotoSection=null;

function freshState(){
  const t={};
  for(const key of Object.keys(DEFAULT_TEMPLATES)){
    const d=DEFAULT_TEMPLATES[key];
    t[key]={ name:d.name, ico:d.ico, rewarded:false,
      sections:d.sections.map((s,si)=>({ title:s.title,
        items:s.items.map((txt,ii)=>({ id:key+'_'+si+'_'+ii, text:txt, done:false, photo:null })) })) };
  }
  return { points:0, sound:true, active:'summer', templates:t };
}
function loadState(){
  const raw=Store.get(STORE_KEY);
  if(raw){ try{ state=JSON.parse(raw); return; }catch(e){} }
  state=freshState();
}
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const r=Store.set(STORE_KEY, JSON.stringify(state));
    if(r==='quota') showToast('Storage full — remove a photo or two');
  },350);
}

/* ================= Sound (synth, no files) ================= */
let audioCtx=null;
function ctx(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
function tone(f,start,dur,type,vol,slideTo){
  const c=ctx(),o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,c.currentTime+start);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+start+dur);
  g.gain.setValueAtTime(0.0001,c.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.22,c.currentTime+start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+start+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+start); o.stop(c.currentTime+start+dur+0.05);
}
const sfx={
  check(){ if(!state.sound)return; tone(560,0,.1,'sine',.28,900); tone(1120,.05,.13,'sine',.16); },
  uncheck(){ if(!state.sound)return; tone(320,0,.11,'sine',.2,190); },
  switch(){ if(!state.sound)return; tone(240,0,.16,'triangle',.18,640); },
  point(){ if(!state.sound)return; tone(988,0,.09,'square',.1); tone(1319,.08,.22,'square',.1); },
  camera(){ if(!state.sound)return; tone(1200,0,.04,'square',.13); tone(820,.05,.05,'square',.13); },
  fanfare(){ if(!state.sound)return; [523,659,784,1047].forEach((f,i)=>tone(f,i*.12,.28,'triangle',.2));
    tone(1047,.5,.55,'triangle',.24); setTimeout(()=>sfx.point(),700); }
};

/* ================= Render ================= */
function tpl(){ return state.templates[state.active]; }
function render(){ renderScore(); renderTabs(); renderPassage(); renderSections(); }

function renderScore(){
  document.getElementById('ptsCount').textContent=state.points;
  let rank=RANKS[0][1]; for(const r of RANKS){ if(state.points>=r[0]) rank=r[1]; }
  document.getElementById('rankName').textContent=rank;
  document.getElementById('btnSound').textContent=state.sound?'🔊':'🔇';
}
function renderTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  for(const key of Object.keys(state.templates)){
    const t=state.templates[key];
    const b=document.createElement('button');
    b.className='tab'+(key===state.active?' active':'');
    b.innerHTML='<span class="ico">'+t.ico+'</span><span class="lbl">'+escapeHtml(t.name)+'</span>';
    b.onclick=()=>{ if(state.active!==key){ state.active=key; sfx.switch(); save(); render(); } };
    el.appendChild(b);
  }
}
function counts(){ let total=0,done=0;
  tpl().sections.forEach(s=>s.items.forEach(it=>{ total++; if(it.done)done++; })); return {total,done}; }
function renderPassage(){
  const c=counts(), pct=c.total?Math.round(100*c.done/c.total):0;
  document.getElementById('pct').textContent=pct;
  document.getElementById('passageName').textContent=tpl().name+' passage';
  const track=document.querySelector('.track'), boat=document.getElementById('boat'), wake=document.getElementById('wake');
  const max=track.clientWidth-52;
  const x=Math.max(0,(pct/100)*max);
  boat.style.left=x+'px'; wake.style.left='0px'; wake.style.width=Math.max(0,x-4)+'px';
}
function renderSections(){
  const root=document.getElementById('sections'); root.className=''; root.innerHTML='';
  tpl().sections.forEach((section,si)=>{
    const sec=document.createElement('div'); sec.className='section';
    const color=FLAG_COLORS[si%FLAG_COLORS.length];
    const head=document.createElement('div'); head.className='section-head';
    head.innerHTML='<svg width="18" height="14" viewBox="0 0 18 14"><rect width="18" height="14" rx="2" fill="'+color+'"/><path d="M0 0 L9 7 L0 14 Z" fill="rgba(255,255,255,.28)"/></svg>'+
      '<h2>'+escapeHtml(section.title)+'</h2><span class="rule"></span>';
    sec.appendChild(head);
    section.items.forEach(item=>{
      const row=document.createElement('div'); row.className='item'+(item.done?' done':'');
      const box=document.createElement('div'); box.className='box';
      box.innerHTML='<svg viewBox="0 0 24 24"><polyline points="4,13 10,19 20,6"/></svg>';
      row.appendChild(box);
      if(item.photo){ const img=document.createElement('img'); img.className='thumb'; img.src=item.photo; img.alt=''; row.appendChild(img); }
      const txt=document.createElement('div'); txt.className='txt'; txt.textContent=item.text; row.appendChild(txt);
      const del=document.createElement('button'); del.className='del'; del.textContent='✕';
      del.onclick=ev=>{ ev.stopPropagation(); deleteItem(si,item.id); };
      row.appendChild(del);
      row.onclick=()=>{ if(!document.body.classList.contains('editing')) toggleItem(si,item.id,row); };
      sec.appendChild(row);
    });
    const add=document.createElement('div'); add.className='add-row';
    const inp=document.createElement('input'); inp.type='text'; inp.placeholder='Add to '+section.title+'…'; inp.maxLength=60;
    const ok=document.createElement('button'); ok.className='btn-mini'; ok.textContent='＋';
    const cam=document.createElement('button'); cam.className='btn-mini cam'; cam.textContent='📷';
    ok.onclick=()=>{ addTextItem(si,inp.value); inp.value=''; };
    inp.onkeydown=e=>{ if(e.key==='Enter'){ addTextItem(si,inp.value); inp.value=''; } };
    cam.onclick=()=>{ pendingPhotoSection=si; sfx.camera(); document.getElementById('photoInput').click(); };
    add.appendChild(inp); add.appendChild(ok); add.appendChild(cam);
    sec.appendChild(add);
    root.appendChild(sec);
  });
}

/* ================= Actions ================= */
function toggleItem(si,id,rowEl){
  const t=tpl(), item=t.sections[si].items.find(x=>x.id===id); if(!item)return;
  item.done=!item.done;
  if(item.done){ sfx.check(); if(rowEl){ rowEl.classList.add('pop'); setTimeout(()=>rowEl.classList.remove('pop'),400); } }
  else { sfx.uncheck(); t.rewarded=false; }
  save(); render();
  const c=counts();
  if(c.total>0 && c.done===c.total && !t.rewarded){ t.rewarded=true; state.points+=1; save(); setTimeout(celebrate,350); }
}
function addTextItem(si,text){ text=(text||'').trim(); if(!text)return;
  tpl().sections[si].items.push({id:'u'+Date.now(),text,done:false,photo:null});
  sfx.check(); save(); render(); showToast('Added: '+text); document.body.classList.add('editing'); }
function deleteItem(si,id){ const items=tpl().sections[si].items;
  const idx=items.findIndex(x=>x.id===id);
  if(idx>=0){ items.splice(idx,1); sfx.uncheck(); save(); render(); document.body.classList.add('editing'); } }
function resetTrip(){ const t=tpl(); t.sections.forEach(s=>s.items.forEach(it=>it.done=false)); t.rewarded=false;
  sfx.switch(); save(); render(); showToast('New trip — list cleared, ready to pack'); }

/* ================= Photos (opens file picker → Downloads/Photos) ================= */
document.getElementById('photoInput').addEventListener('change',function(e){
  const file=e.target.files && e.target.files[0]; e.target.value='';
  if(!file || pendingPhotoSection===null) return;
  const si=pendingPhotoSection; pendingPhotoSection=null;
  const reader=new FileReader();
  reader.onload=function(){
    const img=new Image();
    img.onload=function(){
      const maxSide=320, scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      const cv=document.createElement('canvas'); cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const data=cv.toDataURL('image/jpeg',0.6);
      tpl().sections[si].items.push({id:'p'+Date.now(),text:'Photo item — tap Edit to rename',done:false,photo:data});
      sfx.point(); save(); render(); document.body.classList.add('editing'); showToast('Photo added to the list');
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
});

/* ================= Celebration ================= */
function celebrate(){
  sfx.fanfare();
  document.getElementById('overlayMsg').textContent=tpl().name+' passage — everything packed. Fair winds!';
  document.getElementById('overlay').classList.add('show'); renderScore();
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    const colors=['#19E3C6','#F2C14E','#FF5C3D','#E9F3F8'];
    for(let i=0;i<40;i++){
      const s=document.createElement('div'); s.className='spark';
      s.style.background=colors[i%colors.length];
      const ang=Math.random()*Math.PI*2, dist=80+Math.random()*220, dur=700+Math.random()*700;
      document.body.appendChild(s);
      s.animate([{transform:'translate(0,0) scale(1)',opacity:1},
        {transform:'translate('+Math.cos(ang)*dist+'px,'+(Math.sin(ang)*dist+120)+'px) scale(.3)',opacity:0}],
        {duration:dur,easing:'cubic-bezier(.2,.6,.4,1)'});
      setTimeout(()=>s.remove(),dur+60);
    }
  }
}
document.getElementById('overlayClose').onclick=()=>document.getElementById('overlay').classList.remove('show');

/* ================= Helpers & buttons ================= */
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('btnReset').onclick=function(){
  if(confirm('Start a new trip? All checks clear. Items and photos stay.')) resetTrip(); };
document.getElementById('btnEdit').onclick=function(){
  const on=document.body.classList.toggle('editing');
  this.classList.toggle('on',on); this.textContent=on?'Done':'Edit list'; sfx.switch(); };
document.getElementById('btnSound').onclick=function(){ state.sound=!state.sound; save(); renderScore(); if(state.sound) sfx.point(); };
window.addEventListener('resize',renderPassage);

/* ================= Boot ================= */
loadState(); render();

/* PWA: register service worker (no-op on file://, active on https) */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
